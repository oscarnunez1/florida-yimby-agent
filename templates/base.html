<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Florida YIMBY Intel{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void: #0a0e1a;
      --bg-surface: #f7f6f3;
      --bg-card: #ffffff;
      --text-primary: #0f1117;
      --text-secondary: #4b5563;
      --text-muted: #9ca3af;
      --text-inverse: #ffffff;
      --text-sidebar: #cbd5e1;
      --accent: #e8522a;
      --accent-hover: #c94420;
      --accent-light: #fdf1ec;
      --border-light: #e5e7eb;
      --border-medium: #d1d5db;
      --shadow-card: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-card-hover: 0 4px 16px rgba(0,0,0,0.10);
      --shadow-dropdown: 0 8px 24px rgba(0,0,0,0.12);
      --sidebar-w: 240px;
      --border-sidebar: rgba(255,255,255,0.07);
      --font-heading: 'Playfair Display', serif;
      --font-mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-surface);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--bg-void);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      z-index: 100;
    }

    .sidebar-brand {
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .sidebar-wordmark {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 22px;
      color: var(--text-inverse);
      letter-spacing: -0.02em;
      display: block;
      text-decoration: none;
      line-height: 1;
    }

    .sidebar-wordmark::after {
      content: '';
      display: block;
      width: 32px;
      height: 3px;
      background: var(--accent);
      margin-top: 8px;
      border-radius: 2px;
    }

    .sidebar-nav {
      padding: 16px 0;
      flex: 1;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      height: 44px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-sidebar);
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }

    .nav-link:hover {
      color: var(--text-inverse);
      background: rgba(255,255,255,0.05);
    }

    .nav-link.active {
      color: var(--text-inverse);
      border-left-color: var(--accent);
      background: rgba(232,82,42,0.08);
    }

    .nav-icon { font-size: 15px; width: 20px; text-align: center; }

    .nav-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      background: var(--accent);
      color: #fff;
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: auto;
      line-height: 1.6;
    }

    /* ── Main ── */
    .main { margin-left: var(--sidebar-w); min-height: 100vh; }

    .main-content {
      padding: 36px 40px 60px;
      max-width: 1400px;
    }

    /* ── Mobile header (hidden on desktop) ── */
    .mob-header { display: none; }

    /* ── Page heading ── */
    .page-heading { margin-bottom: 28px; }

    .page-heading h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .page-heading .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Card grid ── */
    .card-grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(3, 1fr);
    }

    /* ── Brief card ── */
    .brief-card {
      background: var(--bg-card);
      border-radius: 10px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .brief-card:hover {
      box-shadow: var(--shadow-card-hover);
      transform: translateY(-2px);
    }

    .card-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .card-img-placeholder {
      width: 100%;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-img-placeholder span {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
      padding: 0 16px;
    }

    .card-body {
      padding: 14px 16px 16px;
    }

    .card-meta-line {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }

    .market-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: #fff;
      background: var(--mc, #475569);
      padding: 2px 8px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .market-tag:hover { opacity: 0.8; }

    .hearing-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      background: var(--accent-light);
      border: 1px solid #f5c5b3;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.04em;
    }

    .hearing-tag.past {
      background: #f1f5f9;
      border-color: var(--border-light);
      color: var(--text-muted);
    }

    .status-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .badge-new      { background: #dbeafe; color: #1e40af; }
    .badge-used     { background: #d1fae5; color: #065f46; }
    .badge-snoozed  { background: #fef3c7; color: #92400e; }
    .badge-dismissed{ background: #f3f4f6; color: #6b7280; }
    .badge-pending  { background: #dbeafe; color: #1e40af; }

    .card-headline {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .card-lede {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Expanded card ── */
    .card-expand {
      display: none;
      border-top: 1px solid var(--border-light);
      padding: 14px 16px 16px;
    }

    .brief-card.expanded .card-expand { display: block; }
    .brief-card.expanded .card-lede {
      -webkit-line-clamp: unset;
      overflow: visible;
    }

    .expand-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin: 12px 0 4px;
    }

    .expand-label:first-child { margin-top: 0; }

    .expand-text {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .expand-sources a {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
      margin-bottom: 3px;
    }

    .expand-sources a:hover { text-decoration: underline; }

    .expand-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border-light);
    }

    /* ── Three-dot menu ── */
    .dot-menu {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
    }

    .dot-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .dot-btn:hover { background: rgba(0,0,0,0.65); }

    .dot-dropdown {
      position: absolute;
      top: 36px;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      box-shadow: var(--shadow-dropdown);
      min-width: 170px;
      overflow: hidden;
    }

    .dot-item {
      display: block;
      width: 100%;
      padding: 10px 14px;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      background: none;
      border: none;
      cursor: pointer;
      transition: background 0.1s;
    }

    .dot-item:hover { background: var(--bg-surface); }

    .dot-sub-items {
      background: #f9fafb;
      border-top: 1px solid var(--border-light);
    }

    .dot-subitem {
      display: block;
      width: 100%;
      padding: 8px 14px 8px 22px;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      transition: background 0.1s;
    }

    .dot-subitem:hover { background: #f1f5f9; }

    /* ── Market filter pills ── */
    .market-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .market-pill {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--mc, #475569);
      color: var(--mc, #475569);
      background: transparent;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
    }

    .market-pill:hover,
    .market-pill.active {
      background: var(--mc, #475569);
      color: #fff;
    }

    .pill-count { opacity: 0.7; font-size: 10px; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      padding: 16px;
      background: var(--bg-card);
      border-radius: 8px;
      border: 1px solid var(--border-light);
      margin-bottom: 24px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .filter-group label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .filter-group input,
    .filter-group select {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 6px 10px;
      border: 1px solid var(--border-medium);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--text-primary);
      height: 34px;
    }

    .filter-group input:focus,
    .filter-group select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,82,42,0.1);
    }

    /* ── Filter details ── */
    .filter-details { margin-bottom: 24px; }

    .filter-summary {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      padding: 10px 0;
      list-style: none;
      user-select: none;
    }

    .filter-summary::-webkit-details-marker { display: none; }

    .filter-active-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      background: var(--accent);
      color: #fff;
      padding: 2px 7px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Buttons ── */
    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-medium);
    }

    .btn-ghost:hover { background: var(--bg-surface); }

    /* ── Tables ── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }

    .data-table th {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
      background: #f9fafb;
    }

    .data-table td {
      padding: 12px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--border-light);
      vertical-align: middle;
    }

    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: #fafafa; }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 32px;
    }

    .pagination a {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border-medium);
      color: var(--text-secondary);
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }

    .pagination a:hover { background: var(--bg-card); color: var(--text-primary); }

    .pagination a.current {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-state-icon { font-size: 40px; margin-bottom: 12px; }

    .empty-state strong {
      display: block;
      font-size: 16px;
      color: var(--text-secondary);
    }

    .empty-state p {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .empty-state code {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border-light);
    }

    /* ── Health dots ── */
    .health-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .health-dot.ok    { background: #10b981; }
    .health-dot.stale { background: #ef4444; }

    /* ── Log viewer ── */
    .log-viewer {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      line-height: 1.65;
      background: var(--bg-void);
      color: #a8b2c8;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 520px;
      overflow-y: auto;
    }

    /* ── Brief detail ── */
    .detail-card {
      background: var(--bg-card);
      border-radius: 10px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
      max-width: 860px;
    }

    .detail-img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
    }

    .detail-img-placeholder {
      width: 100%;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .detail-body { padding: 28px 32px 36px; }

    .detail-headline {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.25;
      margin: 14px 0 0;
    }

    .detail-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border-light);
    }

    .detail-section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .detail-section-text {
      font-size: 15px;
      line-height: 1.65;
      color: var(--text-secondary);
    }

    /* ── Mobile ── */
    @media (max-width: 859px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        z-index: 200;
      }

      .sidebar.open { transform: translateX(0); }

      .mob-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        background: var(--bg-void);
        position: sticky;
        top: 0;
        z-index: 150;
      }

      .mob-wordmark {
        font-family: 'Playfair Display', serif;
        font-size: 18px;
        font-weight: 800;
        color: #fff;
        text-decoration: none;
      }

      .hamburger {
        background: none;
        border: none;
        color: #fff;
        font-size: 22px;
        cursor: pointer;
        padding: 4px;
        line-height: 1;
      }

      .mob-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 190;
      }

      .mob-overlay.visible { display: block; }

      .main { margin-left: 0; }
      .main-content { padding: 20px 16px 40px; }
      .card-grid { grid-template-columns: 1fr; }
    }

    @media (min-width: 860px) and (max-width: 1199px) {
      .card-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 1200px) {
      .card-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── View Transitions ── */
    @view-transition { navigation: auto; }

    @keyframes vt-page-in  { from { opacity:0; transform:scale(0.97); } to { opacity:1; transform:scale(1); } }
    @keyframes vt-page-out { from { opacity:1; transform:scale(1); } to { opacity:0; transform:scale(1.03); } }

    ::view-transition-new(root) { animation: vt-page-in  0.25s cubic-bezier(0.4,0,0.2,1) both; }
    ::view-transition-old(root) { animation: vt-page-out 0.2s  cubic-bezier(0.4,0,0.2,1) both; }
  </style>
</head>
<body>

<div class="mob-overlay" id="mob-overlay" onclick="closeSidebar()"></div>

<header class="mob-header">
  <a href="/" class="mob-wordmark">Florida YIMBY Intel</a>
  <button class="hamburger" onclick="openSidebar()" aria-label="Open menu">☰</button>
</header>

<nav class="sidebar" id="sidebar">
  <div style="padding:24px 20px; border-bottom:1px solid var(--border-sidebar);">
    <div style="font-family:var(--font-heading); font-size:18px; font-weight:700; color:white; letter-spacing:0.02em;">
      YIMBY Agent
    </div>
    <div style="font-family:var(--font-mono); font-size:11px; font-weight:400; color:var(--text-sidebar); opacity:0.7; margin-top:4px; letter-spacing:0.05em;">
      FL
    </div>
  </div>
  <div class="sidebar-nav">
    <a href="/inbox" class="nav-link {{ 'active' if active_page == 'inbox' }}">
      <span class="nav-icon">📰</span>Briefs
      {% if unread_count %}<span class="nav-badge">{{ unread_count }}</span>{% endif %}
    </a>
    <a href="/archive" class="nav-link {{ 'active' if active_page == 'archive' }}">
      <span class="nav-icon">📂</span>Archive
    </a>
    <a href="/sources" class="nav-link {{ 'active' if active_page == 'sources' }}">
      <span class="nav-icon">📡</span>Sources
    </a>
    <a href="/coverage" class="nav-link {{ 'active' if active_page == 'coverage' }}">
      <span class="nav-icon">🗂</span>Coverage
    </a>
    <a href="/logs" class="nav-link {{ 'active' if active_page == 'logs' }}">
      <span class="nav-icon">⚙</span>Logs
    </a>
  </div>
</nav>

<main class="main">
  <div class="main-content">
    {% block content %}{% endblock %}
  </div>
</main>

<script>
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('mob-overlay').classList.add('visible');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('visible');
}

/* ── Three-dot menu ── */
function closeAllMenus() {
  document.querySelectorAll('.dot-dropdown').forEach(function(d) { d.hidden = true; });
  document.querySelectorAll('.dot-sub-items').forEach(function(d) { d.hidden = true; });
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.dot-menu')) closeAllMenus();
});
function toggleDotMenu(e, id) {
  e.stopPropagation();
  var dropdown = document.getElementById('dot-drop-' + id);
  var wasHidden = dropdown.hidden;
  closeAllMenus();
  dropdown.hidden = !wasHidden;
}
function toggleDismissSub(e, id) {
  e.stopPropagation();
  var sub = document.getElementById('dot-sub-' + id);
  sub.hidden = !sub.hidden;
}

/* ── Card navigation ── */
function navigateToCard(e, card) {
  if (e.target.closest('.dot-menu')) return;
  window.location.href = '/briefs/' + card.dataset.id;
}

/* ── Card actions ── */
function dotAction(id, action) {
  closeAllMenus();
  var card = document.querySelector('[data-id="' + id + '"]');
  var prevStatus = card ? (card.dataset.status || 'new') : 'new';
  fetch('/briefs/' + id + '/' + action, { method: 'POST' }).then(function(r) {
    if (!r.ok) return;
    showToast(id, action, prevStatus, card);
    fadeRemoveCard(id);
  });
}
function dotDismiss(id, reason) {
  closeAllMenus();
  var card = document.querySelector('[data-id="' + id + '"]');
  var prevStatus = card ? (card.dataset.status || 'new') : 'new';
  fetch('/briefs/' + id + '/dismiss', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ reason: reason })
  }).then(function(r) {
    if (!r.ok) return;
    showToast(id, 'dismiss', prevStatus, card);
    fadeRemoveCard(id);
  });
}
function fadeRemoveCard(id) {
  var card = document.querySelector('[data-id="' + id + '"]');
  if (!card) return;
  card.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
  card.style.opacity = '0';
  card.style.transform = 'translateY(-8px)';
  setTimeout(function() {
    card.remove();
    updatePillCounts();
  }, 200);
}

/* ── Undo toast ── */
var _toastTimer = null;
var _toastState = null;

function showToast(id, action, prevStatus, cardEl) {
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastState = {
    id:         id,
    prevStatus: prevStatus,
    cardHTML:   cardEl ? cardEl.outerHTML : '',
    cardParent: cardEl ? cardEl.parentNode : null,
    cardNext:   cardEl ? cardEl.nextSibling : null
  };
  var labels = { use: 'Marked as used', snooze: 'Snoozed for 24h', dismiss: 'Dismissed' };
  document.getElementById('toast-message').textContent = labels[action] || 'Action taken';
  var toast = document.getElementById('action-toast');
  toast.style.display = 'flex';
  var bar = document.getElementById('toast-progress');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  bar.offsetWidth; // force reflow
  bar.style.transition = 'width 5s linear';
  bar.style.width = '0%';
  _toastTimer = setTimeout(hideToast, 5000);
}

function hideToast() {
  var toast = document.getElementById('action-toast');
  toast.style.display = 'none';
  _toastState = null;
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
}

function undoBriefAction() {
  if (!_toastState) return;
  var state = _toastState;
  hideToast();
  fetch('/briefs/' + state.id + '/undo', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ previous_status: state.prevStatus })
  }).then(function(r) {
    if (!r.ok || !state.cardHTML || !state.cardParent) return;
    var tmp = document.createElement('div');
    tmp.innerHTML = state.cardHTML;
    var restored = tmp.firstElementChild;
    restored.style.opacity = '0';
    restored.style.transform = 'translateY(-8px)';
    if (state.cardNext && state.cardNext.parentNode === state.cardParent) {
      state.cardParent.insertBefore(restored, state.cardNext);
    } else {
      state.cardParent.appendChild(restored);
    }
    restored.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
    requestAnimationFrame(function() {
      restored.style.opacity = '1';
      restored.style.transform = 'translateY(0)';
    });
    updatePillCounts();
  });
}

function updatePillCounts() {
  var counts = {};
  var total  = 0;
  document.querySelectorAll('.brief-card[data-market]').forEach(function(c) {
    if (c.style.display === 'none') return;
    var m = c.dataset.market || 'OTHER';
    counts[m] = (counts[m] || 0) + 1;
    total++;
  });
  document.querySelectorAll('.market-pill').forEach(function(pill) {
    var span = pill.querySelector('.pill-count');
    if (!span) return;
    var m = pill.dataset.market;
    var n = (m === 'ALL') ? total : (counts[m] || 0);
    span.textContent = '(' + n + ')';
  });
}

/* ── Copy as WordPress HTML ── */
function copyAsHtml(id) {
  var card = document.querySelector('[data-id="' + id + '"]');
  var headline = (card.querySelector('.card-headline') || {}).innerText || '';
  var lede = card.dataset.lede || '';
  var body = card.dataset.body || '';
  var html = '<h2>' + headline + '</h2>\n';
  if (lede) html += '<p><strong>' + lede + '</strong></p>\n';
  if (body) html += '<p>' + body + '</p>\n';
  navigator.clipboard.writeText(html).then(function() {
    var btn = card.querySelector('.btn-copy');
    if (btn) {
      btn.textContent = 'Copied!';
      setTimeout(function() { btn.textContent = 'Copy as WordPress HTML'; }, 2000);
    }
  });
}
</script>

<!-- Undo toast -->
<div id="action-toast" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f1117;color:#fff;padding:12px 16px;border-radius:8px;align-items:center;gap:16px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.3);min-width:300px;font-family:'DM Sans',sans-serif;font-size:14px;">
  <span id="toast-message">Action taken</span>
  <button id="toast-undo" onclick="undoBriefAction()" style="color:#e8522a;background:none;border:none;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;padding:0;margin-left:auto;white-space:nowrap;">Undo</button>
  <div id="toast-progress" style="position:absolute;bottom:0;left:0;height:3px;background:#e8522a;border-radius:0 0 8px 8px;width:100%;"></div>
</div>

{% block scripts %}{% endblock %}
</body>
</html>
