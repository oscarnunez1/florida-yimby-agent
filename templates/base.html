<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Florida YIMBY Agent{% endblock %}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 15px;
    background: #f1f5f9;
    color: #1e293b;
    min-height: 100vh;
  }

  /* ── Nav ── */
  nav {
    background: #1e3a5f;
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 4px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 4px rgba(0,0,0,.25);
  }
  nav .brand {
    color: #93c5fd;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: .04em;
    margin-right: 12px;
    white-space: nowrap;
    padding: 14px 0;
  }
  nav a {
    color: #cbd5e1;
    text-decoration: none;
    font-size: 14px;
    padding: 14px 12px;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  nav a:hover { color: #fff; }
  nav a.active { color: #fff; border-bottom-color: #60a5fa; }

  /* ── Layout ── */
  .page { max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }

  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #64748b; margin-bottom: 20px; }

  /* ── Cards ── */
  .card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: box-shadow .15s;
  }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .card-header {
    padding: 14px 16px 10px;
    cursor: pointer;
    user-select: none;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .05em;
    padding: 2px 7px;
    border-radius: 99px;
    text-transform: uppercase;
  }
  .badge-high   { background: #fee2e2; color: #b91c1c; }
  .badge-medium { background: #fef3c7; color: #92400e; }
  .badge-low    { background: #f1f5f9; color: #475569; }
  .badge-new       { background: #dbeafe; color: #1d4ed8; }
  .badge-used      { background: #d1fae5; color: #065f46; }
  .badge-dismissed { background: #f1f5f9; color: #94a3b8; }
  .badge-snoozed   { background: #ede9fe; color: #5b21b6; }
  .badge-pending   { background: #dbeafe; color: #1d4ed8; }

  .card-source { font-size: 12px; color: #64748b; }
  .card-headline { font-size: 15px; font-weight: 600; line-height: 1.4; margin: 4px 0; }
  .hearing-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: #b45309;
    background: #fef3c7;
    padding: 2px 8px;
    border-radius: 4px;
    margin: 2px 0 4px;
  }
  .hearing-badge.past { color: #6b7280; background: #f1f5f9; font-weight: 400; }
  .accuracy { font-size: 12px; color: #94a3b8; }

  /* ── Card actions ── */
  .card-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    padding: 0 16px 12px;
  }
  .btn {
    font-size: 13px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 5px;
    border: 1px solid #cbd5e1;
    background: #fff;
    color: #334155;
    cursor: pointer;
    transition: background .12s, border-color .12s;
    white-space: nowrap;
  }
  .btn:hover { background: #f1f5f9; border-color: #94a3b8; }
  .btn-primary { background: #1e3a5f; color: #fff; border-color: #1e3a5f; }
  .btn-primary:hover { background: #1e40af; }
  .btn-success { background: #065f46; color: #fff; border-color: #065f46; }
  .btn-success:hover { background: #047857; }
  .btn-danger  { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
  .btn-danger:hover { background: #fecaca; }
  .btn-copy { background: #f0fdf4; color: #166534; border-color: #86efac; }
  .btn-copy:hover { background: #dcfce7; }

  /* ── Dismiss inline form ── */
  .dismiss-form { display: none; align-items: center; gap: 6px; flex-wrap: wrap; }
  .dismiss-form.open { display: flex; }
  .dismiss-form select {
    font-size: 13px;
    padding: 5px 8px;
    border: 1px solid #cbd5e1;
    border-radius: 5px;
    background: #fff;
    color: #334155;
  }

  /* ── Card body (expanded) ── */
  .card-body { display: none; border-top: 1px solid #e2e8f0; padding: 16px; }
  .card-body.open { display: block; }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #94a3b8;
    margin: 16px 0 6px;
  }
  .section-label:first-child { margin-top: 0; }
  .section-text {
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    color: #334155;
  }
  .section-text strong { font-weight: 600; color: #1e293b; }
  .copy-row { margin-top: 16px; padding-top: 12px; border-top: 1px solid #e2e8f0; }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    padding: 8px 12px;
    background: #f8fafc;
    border-bottom: 2px solid #e2e8f0;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #64748b;
  }
  td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  td a { color: #1e40af; text-decoration: none; }
  td a:hover { text-decoration: underline; }

  /* ── Filters ── */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: flex-end;
    margin-bottom: 16px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 14px 16px;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }
  .filter-group input, .filter-group select {
    font-size: 13px;
    padding: 5px 8px;
    border: 1px solid #cbd5e1;
    border-radius: 5px;
    background: #fff;
    color: #334155;
    min-width: 140px;
  }
  .filter-group input[type=date] { min-width: 120px; }

  /* ── Pagination ── */
  .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 20px; }
  .pagination a {
    padding: 6px 12px;
    border: 1px solid #cbd5e1;
    border-radius: 5px;
    text-decoration: none;
    color: #334155;
    font-size: 13px;
  }
  .pagination a:hover { background: #f1f5f9; }
  .pagination a.current { background: #1e3a5f; color: #fff; border-color: #1e3a5f; }

  /* ── Source health ── */
  .stale-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ef4444; margin-right: 6px; }
  .ok-dot    { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #22c55e; margin-right: 6px; }
  .no-dot    { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; margin-right: 6px; }

  /* ── Search box ── */
  .search-box { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-box input {
    flex: 1;
    font-size: 14px;
    padding: 8px 12px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    background: #fff;
  }

  /* ── Flash messages ── */
  .flash { padding: 10px 14px; border-radius: 6px; margin-bottom: 14px; font-size: 14px; }
  .flash-ok  { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
  .flash-err { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 48px 16px; color: #94a3b8; font-size: 14px; }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }

  @media (max-width: 600px) {
    nav .brand { font-size: 12px; margin-right: 4px; }
    nav a { padding: 12px 8px; font-size: 13px; }
    .page { padding: 14px 10px 48px; }
    .card-header { padding: 12px 12px 8px; }
    .card-actions { padding: 0 12px 10px; }
  }
</style>
</head>
<body>
<nav>
  <span class="brand">FL YIMBY</span>
  <a href="/" class="{{ 'active' if active_page == 'today' }}">Today</a>
  <a href="/history" class="{{ 'active' if active_page == 'history' }}">History</a>
  <a href="/sources" class="{{ 'active' if active_page == 'sources' }}">Sources</a>
  <a href="/coverage" class="{{ 'active' if active_page == 'coverage' }}">Coverage Index</a>
  <a href="/logs" class="{{ 'active' if active_page == 'logs' }}">Logs</a>
</nav>

<div class="page">
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
    <div class="flash flash-{{ 'ok' if cat == 'success' else 'err' }}">{{ msg }}</div>
  {% endfor %}
{% endwith %}

{% block content %}{% endblock %}
</div>

<script>
/* ── Card expand / collapse ── */
document.addEventListener("click", function(e) {
  const header = e.target.closest(".card-header");
  if (header) {
    const body = header.closest(".card").querySelector(".card-body");
    if (body) body.classList.toggle("open");
  }
});

/* ── Generic card action (POST → remove or update card) ── */
async function cardAction(briefId, action, extra) {
  const res = await fetch(`/briefs/${briefId}/${action}`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(extra || {})
  });
  const data = await res.json();
  if (!data.ok) { alert(data.error || "Action failed"); return; }
  const card = document.querySelector(`.card[data-id="${briefId}"]`);
  if (!card) return;
  if (action === "use") {
    card.querySelector(".status-badge").textContent = "Used";
    card.querySelector(".status-badge").className = "badge badge-used status-badge";
  } else {
    card.style.transition = "opacity .25s";
    card.style.opacity = "0";
    setTimeout(() => card.remove(), 260);
  }
}

/* ── Dismiss toggle ── */
function toggleDismiss(briefId) {
  const form = document.querySelector(`.dismiss-form[data-id="${briefId}"]`);
  if (!form) return;
  form.classList.toggle("open");
}

async function submitDismiss(briefId) {
  const form = document.querySelector(`.dismiss-form[data-id="${briefId}"]`);
  const reason = form.querySelector("select").value;
  await cardAction(briefId, "dismiss", {reason});
}

/* ── Copy as WordPress HTML ── */
function copyAsHtml(briefId) {
  const card = document.querySelector(`.card[data-id="${briefId}"]`);
  const lede = card.dataset.lede || "";
  const body  = card.dataset.body  || "";
  const paras = body.split(/\n{2,}/).map(p => p.trim()).filter(Boolean);

  let html = `<!-- wp:paragraph -->\n<p><strong>${escHtml(lede)}</strong></p>\n<!-- /wp:paragraph -->`;
  for (const p of paras) {
    html += `\n\n<!-- wp:paragraph -->\n<p>${escHtml(p)}</p>\n<!-- /wp:paragraph -->`;
  }
  navigator.clipboard.writeText(html).then(() => {
    const btn = card.querySelector(".btn-copy");
    const orig = btn.textContent;
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = orig, 1800);
  });
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
